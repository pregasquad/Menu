kind = "slides"
previewPath = "/"
title = "Pregasquad Salon Menu"
version = "1.0.0"
id = "artifacts/pregasquad-menu"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23156

[services.development]
run = "pnpm --filter @workspace/pregasquad-menu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pregasquad-menu", "run", "build" ]
publicDir = "artifacts/pregasquad-menu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23156"
BASE_PATH = "/"
